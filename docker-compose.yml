services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - STELLAR_NETWORK=testnet
      - STELLAR_RPC_URL=https://soroban-testnet.stellar.org
      - STELLAR_NETWORK_PASSPHRASE=Test SDF Network ; September 2015
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-}
      - REGISTRY_CONTRACT_ID=${REGISTRY_CONTRACT_ID:-}
      - API_PORT=3000
    volumes:
      - ./packages/api/src:/app/packages/api/src
      - ./packages/sdk/src:/app/packages/sdk/src

  agent-runtime:
    build:
      context: .
      dockerfile: packages/agent-runtime/Dockerfile
    environment:
      - STELLAR_NETWORK=testnet
      - STELLAR_RPC_URL=https://soroban-testnet.stellar.org
      - STELLAR_NETWORK_PASSPHRASE=Test SDF Network ; September 2015
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-}
      - AGENT_VAULT_CONTRACT_ID=${AGENT_VAULT_CONTRACT_ID:-}
      - REGISTRY_CONTRACT_ID=${REGISTRY_CONTRACT_ID:-}
    volumes:
      - ./packages/agent-runtime/src:/app/packages/agent-runtime/src
      - ./packages/sdk/src:/app/packages/sdk/src
    depends_on:
      - api
