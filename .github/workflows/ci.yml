name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (build + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/sdk
      - run: npm run build --workspace=packages/api
      - run: npm run build --workspace=packages/agent-runtime
      - run: npm run build --workspace=packages/dashboard
      - run: npm run lint --workspaces --if-present
      - run: npm test --workspaces --if-present

  contracts:
    name: Soroban contracts (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
          key: contracts-release-${{ hashFiles('contracts/Cargo.lock') }}
      - run: cargo fmt --all -- --check
        working-directory: contracts
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: contracts
      - run: cargo test
        working-directory: contracts

  testnet-integration:
    name: Testnet integration tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
          key: contracts-release-${{ hashFiles('contracts/Cargo.lock') }}
      - name: Build contracts
        run: cargo build --release --target wasm32-unknown-unknown
        working-directory: contracts
      - name: Install stellar CLI
        run: cargo install --locked stellar-cli
      - name: Run integration tests
        run: cargo test
        working-directory: contracts
        env:
          STELLAR_NETWORK: testnet
          STELLAR_RPC_URL: ${{ secrets.STELLAR_RPC_URL }}
          STELLAR_NETWORK_PASSPHRASE: ${{ secrets.STELLAR_NETWORK_PASSPHRASE }}
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
